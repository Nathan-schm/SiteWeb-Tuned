<body>

<header>
    <div class="logo">
        <a href="./index.html"><img src="./media/img/logo.png" width="100" height="100" alt="logo Tuned"></a>
    </div>
    <nav class="lien">
        <a href="./Brabus.html" class="lienbrabus">BRABUS</a>

        <a href="./Amg.html" class="lienamg">AMG</a>
    </nav>
</header>

<div class="marge"></div>

<div class="hero">
    <p class="label">Tuned — Nous contacter</p>
    <h1>CONTACT</h1>
    <p class="sub">Une question, un projet ? Écrivez-nous, on vous répond rapidement.</p>
</div>

<main>
    <form class="message" action="https://formspree.io/f/mpwdgvzk" method="post">

        <div class="row-2">
            <div class="field">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Dupont" required>
            </div>
            <div class="field">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Jean" required>
            </div>
        </div>

        <div class="row-2">
            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="jean@mail.com" required>
            </div>
            <div class="field">
                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" name="adresse" placeholder="12 rue des Acacias">
            </div>
        </div>

        <div class="divider"></div>

        <div class="field">
            <label for="message-id">Commentaire</label>
            <textarea id="message-id" name="message" placeholder="Votre message..." required></textarea>
        </div>

        <div class="submit-row">
            <span class="hint">* Champs obligatoires</span>
            <button type="submit" class="btn-submit">ENVOYER</button>
        </div>

    </form>
</main>

    </div>
</footer>
